services:
  hivemem:
    build: .
    ports:
      - "8421:8421"
    environment:
      HIVEMEM_JDBC_URL: ${HIVEMEM_JDBC_URL}
      HIVEMEM_DB_USER: ${HIVEMEM_DB_USER}
      HIVEMEM_DB_PASSWORD: ${HIVEMEM_DB_PASSWORD}
      HIVEMEM_EMBEDDING_URL: ${HIVEMEM_EMBEDDING_URL}
    restart: unless-stopped
