services:
  hivemem-db:
    image: pgvector/pgvector:pg17
    container_name: hivemem-db
    environment:
      POSTGRES_DB: hivemem
      POSTGRES_USER: hivemem
      POSTGRES_PASSWORD: ${HIVEMEM_DB_PASSWORD:-secret}
    volumes:
      - hivemem-pgdata:/var/lib/postgresql/data
    networks:
      - hivemem-net
    restart: unless-stopped
    # Proxmox LXC: uncomment the next line
    # security_opt: [apparmor=unconfined]

  hivemem-embeddings:
    image: ghcr.io/ufelmann/hivemem-embeddings:main
    container_name: hivemem-embeddings
    volumes:
      - hivemem-embeddings-models:/app/models
    networks:
      - hivemem-net
    restart: unless-stopped
    # Proxmox LXC: uncomment the next line
    # security_opt: [apparmor=unconfined]

  hivemem:
    image: ghcr.io/ufelmann/hivemem:main
    container_name: hivemem
    ports:
      - "8421:8421"
    environment:
      HIVEMEM_JDBC_URL: jdbc:postgresql://hivemem-db:5432/hivemem
      HIVEMEM_DB_USER: hivemem
      HIVEMEM_DB_PASSWORD: ${HIVEMEM_DB_PASSWORD:-secret}
      HIVEMEM_EMBEDDING_URL: http://hivemem-embeddings:80
      HIVEMEM_ATTACHMENT_ENABLED: "true"
      SEAWEEDFS_S3_ENDPOINT: http://seaweedfs:8333
      SEAWEEDFS_S3_BUCKET: hivemem-attachments
      SEAWEEDFS_S3_ACCESS_KEY: hivemem
      SEAWEEDFS_S3_SECRET_KEY: hivemem_secret
    depends_on:
      - hivemem-db
      - hivemem-embeddings
      - seaweedfs
    networks:
      - hivemem-net
    restart: unless-stopped
    # Proxmox LXC: uncomment the next line
    # security_opt: [apparmor=unconfined]

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: >
      server
      -s3
      -s3.config=/etc/seaweedfs/s3.json
      -dir=/data
    volumes:
      - seaweedfs_data:/data
      - ./seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    ports:
      - "8333:8333"
    networks:
      - hivemem-net
    restart: unless-stopped
    # Proxmox LXC: uncomment the next line
    # security_opt: [apparmor=unconfined]

networks:
  hivemem-net:

volumes:
  hivemem-pgdata:
  hivemem-embeddings-models:
  seaweedfs_data:
