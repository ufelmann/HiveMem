name: CI

on:
  push:
    branches: [main, java-spring-boot-migration]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify Docker (required for Testcontainers)
        run: docker version

      - name: Run tests
        working-directory: java-server
        run: mvn -B -ntp test

      - name: Publish test report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: "java-server/target/surefire-reports/TEST-*.xml"
          check_name: Java test results
