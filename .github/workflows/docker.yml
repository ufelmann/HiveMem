name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  BASE_IMAGE: ghcr.io/${{ github.repository_owner }}/hivemem-base
  IMAGE: ghcr.io/${{ github.repository_owner }}/hivemem

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Check if base image needs rebuild
        id: check
        run: |
          BASE_HASH=$(sha256sum Dockerfile.base pyproject.toml | sha256sum | cut -d' ' -f1)
          echo "hash=$BASE_HASH" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if cached base exists
        id: cache
        run: |
          if docker manifest inspect "$BASE_IMAGE:$BASE_HASH" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          BASE_IMAGE: ${{ env.BASE_IMAGE }}
          BASE_HASH: ${{ steps.check.outputs.hash }}

      - name: Build and push base image
        if: steps.cache.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: |
            ${{ env.BASE_IMAGE }}:latest
            ${{ env.BASE_IMAGE }}:${{ steps.check.outputs.hash }}

      - name: Tag existing as latest
        if: steps.cache.outputs.exists == 'true'
        run: |
          docker pull "$BASE_IMAGE:$BASE_HASH"
          docker tag "$BASE_IMAGE:$BASE_HASH" "$BASE_IMAGE:latest"
          docker push "$BASE_IMAGE:latest"
        env:
          BASE_IMAGE: ${{ env.BASE_IMAGE }}
          BASE_HASH: ${{ steps.check.outputs.hash }}

    outputs:
      base-tag: ${{ steps.check.outputs.hash }}

  build:
    runs-on: ubuntu-latest
    needs: build-base
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}:latest
