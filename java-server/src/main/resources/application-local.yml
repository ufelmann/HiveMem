spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${HIVEMEM_JDBC_URL:jdbc:postgresql://localhost:5432/hivemem}
    username: ${HIVEMEM_DB_USER:hivemem}
    password: ${HIVEMEM_DB_PASSWORD:hivemem}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  jooq:
    sql-dialect: POSTGRES
